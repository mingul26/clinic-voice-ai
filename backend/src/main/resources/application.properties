spring.application.name=clinic

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/clinic}
spring.datasource.username=${DB_USER:clinic}
spring.datasource.password=${DB_PASS:clinic}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Initialization
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql
spring.jpa.defer-datasource-initialization=true

# Server
server.port=8080

# Bolna
bolna.api.key=${BOLNA_API_KEY:}
bolna.agent.id=${BOLNA_AGENT_ID:}
bolna.api.url=https://api.bolna.ai/call
bolna.verified.number=${BOLNA_VERIFIED_NUMBER:}

# Logging
logging.level.com.bolna.clinic=INFO
