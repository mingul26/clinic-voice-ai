version: '3.9'

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: clinic_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       clinic
      POSTGRES_USER:     clinic
      POSTGRES_PASSWORD: clinic
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinic -d clinic"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Spring Boot Backend ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clinic_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL:         jdbc:postgresql://postgres:5432/clinic
      DB_USER:        clinic
      DB_PASS:        clinic
      BOLNA_API_KEY:  ${BOLNA_API_KEY:-}
      BOLNA_AGENT_ID: ${BOLNA_AGENT_ID:-}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health 2>/dev/null || wget -qO- http://localhost:8080/api/doctors || exit 0"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── React Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clinic_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
